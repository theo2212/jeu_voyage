<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jeu de Voyage - Humour Noir</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-tribunal: #ff3b30;
            --c-tribunal-glow: rgba(255, 59, 48, 0.4);
            --c-draft: #007aff;
            --c-draft-glow: rgba(0, 122, 255, 0.4);
            --c-prefere: #af52de;
            --c-prefere-glow: rgba(175, 82, 222, 0.4);
            --c-daube: #34c759;
            --c-daube-glow: rgba(52, 199, 89, 0.4);
            --c-redflag: #ff9500;
            --c-redflag-glow: rgba(255, 149, 0, 0.4);
            
            --bg-dark: #07070a;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Outfit', system-ui, -apple-system, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Fond animé façon premium */
        .bg-shapes {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            z-index: -1;
            background: #000;
        }
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out alternate;
        }
        .shape-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #7e1262 0%, rgba(126,18,98,0) 70%);
            top: -150px; left: -150px;
        }
        .shape-2 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, #38198a 0%, rgba(56,25,138,0) 70%);
            bottom: -200px; right: -200px;
            animation-delay: -5s;
        }
        .shape-3 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #ff2d55 0%, rgba(255,45,85,0) 70%);
            top: 40%; left: 40%;
            opacity: 0.4;
            animation-delay: -10s;
        }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(60px, 80px) scale(1.2) rotate(10deg); }
            100% { transform: translate(-40px, 30px) scale(0.9) rotate(-5deg); }
        }

        /* Conteneur principal */
        .container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 24px;
            z-index: 1;
        }

        h1 {
            text-align: center;
            font-size: 2.6rem;
            margin: 20px 0 30px 0;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 0%, #b3b3b3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(255,255,255,0.15);
        }

        /* Vues */
        #menu-view, #theme-setup-view, #players-setup-view, #game-view, #shop-view {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        #menu-view {
            overflow-y: auto;
            padding-right: 5px; /* Pour la scrollbar */
        }

        #theme-setup-view, #players-setup-view, #game-view, #shop-view {
            display: none;
            opacity: 0;
            transform: scale(0.95);
        }

        /* Boutons Menu */
        .menu-buttons {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 16px;
            padding-bottom: 20px;
        }

        .menu-section-title {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 10px 0 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        .btn-menu {
            flex: none;
            min-height: 65px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            color: white;
            font-size: 1.15rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .bg-tribunal { background: linear-gradient(135deg, rgba(255,59,48,0.2) 0%, rgba(255,59,48,0.05) 100%); box-shadow: 0 10px 30px var(--c-tribunal-glow); }
        .bg-draft { background: linear-gradient(135deg, rgba(0,122,255,0.2) 0%, rgba(0,122,255,0.05) 100%); box-shadow: 0 10px 30px var(--c-draft-glow); }
        .bg-prefere { background: linear-gradient(135deg, rgba(175,82,222,0.2) 0%, rgba(175,82,222,0.05) 100%); box-shadow: 0 10px 30px var(--c-prefere-glow); }
        .bg-daube { background: linear-gradient(135deg, rgba(52,199,89,0.2) 0%, rgba(52,199,89,0.05) 100%); box-shadow: 0 10px 30px var(--c-daube-glow); }
        .bg-redflag { background: linear-gradient(135deg, rgba(255,149,0,0.2) 0%, rgba(255,149,0,0.05) 100%); box-shadow: 0 10px 30px var(--c-redflag-glow); }
        
        .bg-drink { background: linear-gradient(135deg, rgba(255,45,85,0.2) 0%, rgba(255,45,85,0.05) 100%); box-shadow: 0 5px 20px rgba(255,45,85,0.3); border-color: rgba(255,45,85,0.3); }
        .bg-drink2 { background: linear-gradient(135deg, rgba(88,86,214,0.2) 0%, rgba(88,86,214,0.05) 100%); box-shadow: 0 5px 20px rgba(88,86,214,0.3); border-color: rgba(88,86,214,0.3); }
        .bg-drink3 { background: linear-gradient(135deg, rgba(255,204,0,0.2) 0%, rgba(255,204,0,0.05) 100%); box-shadow: 0 5px 20px rgba(255,204,0,0.3); border-color: rgba(255,204,0,0.3); color:#ffcc00; }

        .btn-menu::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 24px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .btn-menu:active {
            transform: scale(0.96);
            filter: brightness(1.2);
        }

        .btn-shop {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 215, 0, 0.05) 100%);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            border-color: rgba(255, 215, 0, 0.3);
            flex: none;
            padding: 20px;
            margin-bottom: 20px;
            animation: pulse-shop 3s infinite alternate;
        }
        @keyframes pulse-shop {
            0% { box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2); }
            100% { box-shadow: 0 15px 40px rgba(255, 215, 0, 0.5); }
        }
        .btn-shop::before {
            background: linear-gradient(135deg, rgba(255,215,0,0.5) 0%, rgba(255,215,0,0) 100%);
        }

        /* --- Player Setup View --- */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-text {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 16px 20px;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: border-color 0.2s;
        }

        .input-text:focus {
            border-color: rgba(255, 255, 255, 0.5);
        }

        .btn-add {
            background: linear-gradient(135deg, #007aff, #5ac8fa);
            border: none;
            border-top: 1px solid rgba(255,255,255,0.4);
            border-radius: 16px;
            padding: 0 24px;
            color: #fff;
            font-weight: bold;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.4);
            transition: transform 0.1s;
        }
        .btn-add:active {
            transform: scale(0.9);
        }

        .players-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: bold;
            font-size: 1.2rem;
            backdrop-filter: blur(10px);
        }

        .btn-remove {
            background: rgba(255, 59, 48, 0.2);
            border: none;
            border-radius: 50%;
            width: 32px; height: 32px;
            color: #ff3b30;
            font-weight: bold;
            font-size: 1.2rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Game View --- */
        .game-header {
            text-align: center;
            margin-bottom: 10px;
        }

        #game-title {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(255,255,255,0.1);
        }

        .txt-tribunal { background-image: linear-gradient(135deg, #ff3b30, #ff9500); }
        .txt-draft { background-image: linear-gradient(135deg, #007aff, #5ac8fa); }
        .txt-prefere { background-image: linear-gradient(135deg, #af52de, #ff2d55); }
        .txt-daube { background-image: linear-gradient(135deg, #34c759, #30d158); }
        .txt-redflag { background-image: linear-gradient(135deg, #ff9500, #ffcc00); }
        .txt-boire { background-image: linear-gradient(135deg, #ff2d55, #ff9500); }
        .txt-boire2 { background-image: linear-gradient(135deg, #5856d6, #5ac8fa); }

        /* Scoreboard */
        #scoreboard {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .score-badge {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 6px 12px;
            font-weight: bold;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .score-value {
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 2px 8px;
        }
        .coin-value {
            color: #ffd700;
            font-weight: 900;
        }

        .card-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
        }

        #game-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 32px;
            padding: 40px 30px;
            width: 100%;
            min-height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 2px 0 rgba(255,255,255,0.2), inset 0 0 20px rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        
        #game-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            border-radius: 32px 32px 0 0;
            pointer-events: none;
        }

        #game-text {
            font-size: 1.8rem;
            line-height: 1.4;
            font-weight: 700;
            text-align: center;
            letter-spacing: -0.5px;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        /* Vote buttons */
        .vote-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
        }

        .btn-vote {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 16px;
            color: #fff;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .btn-vote small {
            color: #ffd700;
            font-size: 0.8rem;
            opacity: 0.8;
        }
        .btn-vote:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }
        .btn-skip {
            background: rgba(255, 59, 48, 0.1);
            border-color: rgba(255, 59, 48, 0.3);
            color: #ff3b30;
            grid-column: 1 / -1;
        }

        /* Timer Styles */
        #timer-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }
        #timer-display {
            font-size: 4rem;
            font-weight: 900;
            color: #ff2d55;
            text-shadow: 0 0 20px rgba(255, 45, 85, 0.5);
            margin: 10px 0;
            font-variant-numeric: tabular-nums;
        }
        .btn-timer-start {
            background: linear-gradient(135deg, #ff9500, #ff2d55);
            border: none;
            border-radius: 20px;
            padding: 15px 30px;
            color: #fff;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(255, 45, 85, 0.4);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-timer-start:active {
            transform: scale(0.9);
        }
        .timer-flash {
            animation: flash-red 0.5s infinite alternate;
        }
        @keyframes flash-red {
            0% { background-color: var(--bg-dark); }
            100% { background-color: rgba(255, 45, 85, 0.4); }
        }

        .btn-action {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-action:active {
            transform: scale(0.96);
        }

        .btn-next {
            background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
            color: #000000;
            box-shadow: 0 15px 30px rgba(255,255,255,0.2), inset 0 2px 0 rgba(255,255,255,0.8);
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.08);
            color: #d1d1d1;
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .text-pop-out { opacity: 0; transform: translateY(-20px) scale(0.95); }
        .text-pop-in { opacity: 1; transform: translateY(0) scale(1); }

        /* --- Shop View --- */
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .shop-header select {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            outline: none;
            backdrop-filter: blur(10px);
            appearance: none;
        }
        .shop-balance {
            font-size: 1.5rem;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }
        .shop-grid {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            padding-right: 5px;
        }
        .shop-item {
            background: rgba(25, 25, 30, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        .shop-item.type-soft {
            border-left: 4px solid #5ac8fa;
        }
        .shop-item.type-spicy {
            border-left: 4px solid #ff2d55;
            background: linear-gradient(90deg, rgba(255, 45, 85, 0.1) 0%, rgba(25, 25, 30, 0.6) 50%);
        }
        .shop-item-info {
            flex: 1;
            padding-right: 15px;
        }
        .shop-item-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        .shop-item-cost {
            color: #ffd700;
            font-weight: 900;
            font-size: 0.9rem;
        }
        .btn-buy {
            background: #ffffff;
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 10px 16px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-buy:disabled {
            background: rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.5);
            cursor: not-allowed;
        }
        .btn-buy:active:not(:disabled) {
            transform: scale(0.9);
        }

    </style>
</head>
<body>

    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <!-- Vue : Menu Principal -->
        <div id="menu-view">
            <h1>Jeu de Voyage</h1>
            <button class="btn-menu btn-shop" onclick="openShop()">🛒 Boutique (BussCoins)</button>
            <div class="menu-buttons">
                <div class="menu-section-title">🗣️ Jeux de Débats</div>
                <button class="btn-menu bg-tribunal" onclick="startGame('tribunal')">Tribunal des Opinions</button>
                <button class="btn-menu bg-draft" onclick="startGame('draft')">Draft de l'Absurde</button>
                <button class="btn-menu bg-prefere" onclick="startGame('prefere')">Tu Préfères de l'Extrême</button>
                <button class="btn-menu bg-daube" onclick="startGame('daube')">Pitch de Daube</button>
                <button class="btn-menu bg-redflag" onclick="startGame('redflag')">C'est un 10, MAIS...</button>

                <div class="menu-section-title" style="margin-top:20px;">🍻 Jeux à Boire</div>
                <button class="btn-menu bg-drink" onclick="startGame('boire_susceptible')">🎯 Le Tribunal</button>
                <button class="btn-menu bg-drink2" onclick="startGame('boire_jamais')">🤫 Je n'ai jamais...</button>
                <button class="btn-menu bg-drink" onclick="startGame('boire_action')">⚖️ Action ou Cul Sec</button>
                <button class="btn-menu bg-drink3" onclick="startGame('boire_dictateur')">👑 Le Dictateur</button>
                <button class="btn-menu bg-drink" onclick="startGame('boire_serieux')">😶 Garde ton sérieux</button>
                <button class="btn-menu bg-drink2" onclick="startGame('boire_7sec')">⏱️ Les 7 Secondes</button>
                <button class="btn-menu bg-drink" onclick="startGame('boire_roulette')">🎲 La Roulette Russe</button>
                <button class="btn-menu bg-drink2" onclick="startGame('boire_menteur')">🧠 Menteur ou Psycho</button>
                <button class="btn-menu bg-drink" onclick="startGame('boire_kamikaze')">💥 Le Kamikaze</button>
                <button class="btn-menu bg-drink2" onclick="startGame('boire_dilemme')">☠️ Dilemme Mortel</button>
            </div>
            <button class="btn-action btn-back" style="margin-top:20px; font-size:1rem;" onclick="resetMemory()">🔄 Réinitialiser la mémoire</button>
        </div>



        <!-- Vue : Choix du Thème -->
        <div id="theme-setup-view">
            <h1>Niveau de Jeu</h1>
            <div style="flex: 1; display: flex; flex-direction: column; gap: 20px; justify-content: center;">
                <button class="btn-action" style="background: linear-gradient(135deg, #34c759, #30d158); color: white; height: 120px; font-size: 1.5rem; flex-direction: column; gap: 10px;" onclick="selectTheme('soft')">
                    🟢 MODE SOFT

                                    "Tu préfères : Ne pouvoir faire l'amour que dans l'obscurité totale pour le reste de ta vie OU devoir toujours le faire en plein jour en public ?"

};

        const gameTitles = {
            tribunal: "Tribunal des Opinions",
            draft: "Draft de l'Absurde",
            prefere: "Tu Préfères... de l'Extrême",
            daube: "Pitch de Daube",
            redflag: "C'est un 10, MAIS...",
            boire_susceptible: "Qui est le plus susceptible",
            boire_jamais: "Je n'ai jamais (Sombre)",
            boire_action: "Action ou Cul Sec",
            boire_dictateur: "Le Dictateur",
            boire_serieux: "Garde ton sérieux",
            boire_7sec: "7 Secondes de l'Enfer",
            boire_roulette: "La Roulette Russe",
            boire_menteur: "Menteur ou Psychopathe",
            boire_kamikaze: "Le Kamikaze",
            boire_dilemme: "Dilemme Mortel"
        };

        const shopItems = [
            // Soft / Amusants
            { name: "Choix de la playlist musicale (30 min)", cost: 10, type: "soft" },
            { name: "Surnom ridicule pour l'autre", cost: 10, type: "soft" },
            { name: "Répondre avec un accent au choix (10 min)", cost: 20, type: "soft" },
            { name: "Droit de veto absolu sur un vote", cost: 30, type: "soft" },
            { name: "Massage des épaules (10 min)", cost: 40, type: "soft" },
            { name: "Action Joker : Petite corvée à l'arrivée", cost: 50, type: "soft" },
            
            // Epicés (Tirés d'Amiocoin)
            { name: "Baiser où tu veux, quand tu veux", cost: 20, type: "spicy" },
            { name: "Manger qqch directement dans la bouche de l'autre", cost: 30, type: "spicy" },
            { name: "Toucher l'autre en public sans se faire capter", cost: 40, type: "spicy" },
            { name: "Droit à une sieste collée-serrée", cost: 50, type: "spicy" },
            { name: "Lancer de dé coquin (6 idées sexy)", cost: 60, type: "spicy" },
            { name: "Massage érotique à l’huile ce soir", cost: 80, type: "spicy" },
            { name: "Gage mystère à exécuter sans le savoir", cost: 100, type: "spicy" },
            { name: "Shooting photo sexy (privé)", cost: 120, type: "spicy" },
            { name: "Nuit de plaisir avec toutes les envies réalisées", cost: 150, type: "spicy" },
            { name: "Fantasme surprise réalisé sans tabou", cost: 200, type: "spicy" }
        ];

        let currentGame = '';
        let currentTheme = 'soft';
        let availableIndices = {};
        let players = [];
        let timerInterval;

        function initIndices() {
            availableIndices = {};
            for (let theme in phrases) {
                for (let key in phrases[theme]) {
                    availableIndices[theme + '_' + key] = Array.from({length: phrases[theme][key].length}, (_, i) => i);
                }
            }
            saveState();
        }

        function saveState() {
            localStorage.setItem('voyage_players', JSON.stringify(players));
            localStorage.setItem('voyage_availableIndices', JSON.stringify(availableIndices));
        }

        function loadState() {
            const savedVersion = localStorage.getItem('voyage_version');
            if (savedVersion !== 'v4_themes') {
                localStorage.clear();
                localStorage.setItem('voyage_version', 'v4_themes');
            }

            const savedPlayers = localStorage.getItem('voyage_players');
            if (savedPlayers) players = JSON.parse(savedPlayers);

            const savedIndices = localStorage.getItem('voyage_availableIndices');
            if (savedIndices) {
                availableIndices = JSON.parse(savedIndices);
            } else {
                initIndices();
            }
        }

        function resetMemory() {
            if(confirm("Veux-tu vraiment effacer tous les joueurs, les coins et recommencer les cartes à zéro ?")) {
                localStorage.removeItem('voyage_players');
                localStorage.removeItem('voyage_availableIndices');
                players = [];
                initIndices();
                alert("Mémoire effacée !");
            }
        }

        // --- Gestion des Joueurs ---
        function handleEnter(event) {
            if (event.key === 'Enter') addPlayer();
        }

        function addPlayer() {
            const input = document.getElementById('player-input');
            const name = input.value.trim();
            if (name) {
                players.push({ name: name, score: 0, coins: 0 });
                input.value = '';
                saveState();
                renderPlayers();
            }
        }

        function removePlayer(index) {
            players.splice(index, 1);
            saveState();
            renderPlayers();
        }

        function renderPlayers() {
            const list = document.getElementById('players-list');
            list.innerHTML = '';
            players.forEach((p, index) => {
                list.innerHTML += `
                    <div class="player-item">
                        <span>${p.name} <small style="color:#ffd700">(${p.coins} 🪙)</small></span>
                        <button class="btn-remove" onclick="removePlayer(${index})">&times;</button>
                    </div>
                `;
            });
        }

        // --- Navigation ---
        function switchView(fromId, toId, callback) {
            const fromView = document.getElementById(fromId);
            const toView = document.getElementById(toId);
            
            fromView.style.opacity = '0';
            fromView.style.transform = 'scale(0.9)';
            
            setTimeout(() => {
                fromView.style.display = 'none';
                toView.style.display = 'flex';
                
                if(callback) callback();
                
                setTimeout(() => {
                    toView.style.opacity = '1';
                    toView.style.transform = 'scale(1)';
                }, 50);
            }, 300);
        }

        function startGame(gameKey) {
            currentGame = gameKey;
            switchView('menu-view', 'theme-setup-view');
        }

        function selectTheme(theme) {
            currentTheme = theme;
            switchView('theme-setup-view', 'players-setup-view', () => {
                document.getElementById('player-input').focus();
            });
        }

        function returnToMenu(currentViewId) {
            document.body.classList.remove('timer-flash');
            clearInterval(timerInterval);
            switchView(currentViewId, 'menu-view');
        }

        function beginGame() {
            players.forEach(p => p.score = 0); 
            
            switchView('players-setup-view', 'game-view', () => {
                const gameTitle = document.getElementById('game-title');
                gameTitle.innerText = gameTitles[currentGame] + (currentTheme === 'hard' ? ' 🌶️' : '');
                gameTitle.className = 'txt-' + currentGame.replace('boire_', 'boire'); // Fallback style
                if (currentGame.includes('boire')) gameTitle.className = 'txt-boire';
                if (currentGame === 'tribunal') gameTitle.className = 'txt-tribunal';
                if (currentGame === 'draft') gameTitle.className = 'txt-draft';
                if (currentGame === 'prefere') gameTitle.className = 'txt-prefere';
                if (currentGame === 'daube') gameTitle.className = 'txt-daube';
                if (currentGame === 'redflag') gameTitle.className = 'txt-redflag';
                
                updateScoreboard();
                renderVoteButtons();
                nextPhrase(true);
            });
        }

        // --- Chrono 7 Secondes ---
        function startTimer() {
            const display = document.getElementById('timer-display');
            const btn = document.getElementById('btn-timer-start');
            let timeLeft = 7;
            
            btn.style.display = 'none';
            display.innerText = timeLeft;
            display.classList.remove('timer-flash');
            document.body.classList.remove('timer-flash');

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                display.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    display.innerText = "0 ! BOIS !";
                    document.body.classList.add('timer-flash');
                    display.classList.add('timer-flash');
                    btn.innerText = "Relancer ⏱️";
                    btn.style.display = 'block';
                }
            }, 1000);
        }

        // --- Boutique (Shop) ---
        function openShop() {
            if(players.length === 0) {
                alert("Ajoutez d'abord des joueurs pour ouvrir la boutique et leur donner une cagnotte !");
                return;
            }
            switchView('menu-view', 'shop-view', () => {
                const select = document.getElementById('shop-player-select');
                select.innerHTML = players.map((p, i) => `<option value="${i}">${p.name}</option>`).join('');
                renderShopItems();
            });
        }

        function renderShopItems() {
            const select = document.getElementById('shop-player-select');
            const playerIndex = select.value;
            const player = players[playerIndex];
            
            document.getElementById('shop-balance').innerText = player.coins + " 🪙";
            
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = shopItems.map((item, index) => {
                const canAfford = player.coins >= item.cost;
                return `
                    <div class="shop-item type-${item.type}">
                        <div class="shop-item-info">
                            <div class="shop-item-name">${item.name}</div>
                            <div class="shop-item-cost">${item.cost} 🪙</div>
                        </div>
                        <button class="btn-buy" onclick="buyItem(${index})" ${!canAfford ? 'disabled' : ''}>Acheter</button>
                    </div>
                `;
            }).join('');
        }

        function buyItem(itemIndex) {
            const select = document.getElementById('shop-player-select');
            const playerIndex = select.value;
            const player = players[playerIndex];
            const item = shopItems[itemIndex];
            
            if (player.coins >= item.cost) {
                player.coins -= item.cost;
                saveState();
                alert(`🎁 ${player.name} vient d'acheter : "${item.name}" ! Préparez-vous !`);
                renderShopItems();
            }
        }

        // --- Logique de Jeu ---
        function updateScoreboard() {
            const scoreboard = document.getElementById('scoreboard');
            if (players.length === 0) {
                scoreboard.style.display = 'none';
                return;
            }
            scoreboard.style.display = 'flex';
            scoreboard.innerHTML = players.map(p => `
                <div class="score-badge">
                    <span>${p.name}</span>
                    <span class="score-value">${p.score} pts</span>
                    <span class="coin-value">${p.coins} 🪙</span>
                </div>
            `).join('');
        }

        function renderVoteButtons() {
            const container = document.getElementById('vote-controls');
            if (players.length === 0) {
                container.innerHTML = `<button class="btn-action btn-next" onclick="nextPhrase()">Suivant</button>`;
                container.style.display = 'flex';
                return;
            }
            
            container.style.display = 'grid';
            let html = players.map((p, index) => `
                <button class="btn-vote" onclick="votePlayer(${index})">
                    <span>+1 Point pour ${p.name}</span>
                    <small>Gagne 10 🪙</small>
                </button>
            `).join('');
            
            html += `<button class="btn-vote btn-skip" onclick="nextPhrase()">Passer la manche</button>`;
            
            container.innerHTML = html;
        }

        function votePlayer(index) {
            players[index].score += 1;
            players[index].coins += 10;
            saveState();
            updateScoreboard();
            nextPhrase();
        }

        function nextPhrase(isFirst = false) {
            const memKey = currentTheme + '_' + currentGame;
            let list = availableIndices[memKey];
            
            if (!list || list.length === 0) {
                list = Array.from({length: phrases[currentTheme][currentGame].length}, (_, i) => i);
                availableIndices[memKey] = list;
            }
            
            const randomIndexList = Math.floor(Math.random() * list.length);
            const phraseIndex = list.splice(randomIndexList, 1)[0];
            saveState();
            
            const textElement = document.getElementById('game-text');
            const cardElement = document.getElementById('game-card');

            // Timer display logic
            if (currentGame === 'boire_7sec') {
                document.getElementById('timer-container').style.display = 'flex';
                document.getElementById('timer-display').innerText = '7';
                document.getElementById('timer-display').classList.remove('timer-flash');
                document.getElementById('btn-timer-start').style.display = 'block';
                document.getElementById('btn-timer-start').innerText = 'Lancer le Chrono ⏱️';
                document.body.classList.remove('timer-flash');
                clearInterval(timerInterval);
            } else {
                document.getElementById('timer-container').style.display = 'none';
                document.body.classList.remove('timer-flash');
                clearInterval(timerInterval);
            }
            
            if (isFirst) {
                textElement.innerText = phrases[currentTheme][currentGame][phraseIndex];
                textElement.className = 'text-pop-in';
            } else {
                textElement.className = 'text-pop-out';
                cardElement.style.transform = 'scale(0.98)';
                
                setTimeout(() => {
                    textElement.innerText = phrases[currentTheme][currentGame][phraseIndex];
                    textElement.className = 'text-pop-in';
                    cardElement.style.transform = 'scale(1)';
                }, 250);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadState();
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker Registered'));
            }
        });
    </script>
