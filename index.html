            --c-draft: #007aff;

            --c-redflag: #ff9500;

        * {

            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin: 30px 0;
            font-weight: 900;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Views */
        #menu-view, #game-view {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 20px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #game-view {
            display: none;
            opacity: 0;
            transform: translateX(100%);
        }

        /* Menu Buttons */
        .menu-buttons {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 15px;
            padding-bottom: 20px;
        }

        .btn-menu {
            flex: 1;
            border: none;
            border-radius: var(--btn-radius);
            color: white;
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), filter 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn-menu::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 100%);
        }

        .btn-menu:active {
            transform: scale(0.95);
            filter: brightness(0.9);
        }

        .bg-tribunal { background: linear-gradient(135deg, #ff3b30, #ff2d55); box-shadow: 0 8px 25px rgba(255, 59, 48, 0.3); }
        .bg-draft { background: linear-gradient(135deg, #007aff, #5ac8fa); box-shadow: 0 8px 25px rgba(0, 122, 255, 0.3); }
        .bg-prefere { background: linear-gradient(135deg, #af52de, #5856d6); box-shadow: 0 8px 25px rgba(175, 82, 222, 0.3); }
        .bg-daube { background: linear-gradient(135deg, #34c759, #30d158); box-shadow: 0 8px 25px rgba(52, 199, 89, 0.3); }
        .bg-redflag { background: linear-gradient(135deg, #ff9500, #ffcc00); box-shadow: 0 8px 25px rgba(255, 149, 0, 0.3); }

        /* Game View */
        .game-header {
            text-align: center;
            margin-bottom: 20px;
            margin-top: 10px;
        }

        #game-title {
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .txt-tribunal { color: var(--c-tribunal); }
        .txt-draft { color: var(--c-draft); }
        .txt-prefere { color: var(--c-prefere); }
        .txt-daube { color: var(--c-daube); }
        .txt-redflag { color: var(--c-redflag); }

        .card-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        #game-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.05);
        }

        #game-text {
            font-size: 1.8rem;
            line-height: 1.4;
            font-weight: 700;
            text-align: center;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        .btn-action {
            width: 100%;
            padding: 22px;
            border-radius: 18px;
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-action:active {
            transform: scale(0.96);
        }

        .btn-next {
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 4px 15px rgba(255,255,255,0.15);
        }

        .btn-back {
            background-color: transparent;
            color: #888;
            border: 2px solid #333;
        }
    </style>
</head>

                "C'est un 10, mais il/elle refuse de payer l'addition par principe.",
                "C'est un 10, mais il/elle mange ses crottes de nez au feu rouge.",
                "C'est un 10, mais il/elle te critique sur ton poids.",
                "C'est un 10, mais il/elle ne jure que par l'astrologie pour prendre des décisions.",
                "C'est un 10, mais il/elle écoute du Jul à fond dans sa Twingo.",
                "C'est un 10, mais il/elle a une voix ultra nasillarde.",
                "C'est un 10, mais il/elle se ronge les ongles de pied.",
                "C'est un 10, mais il/elle te spoil toutes les séries.",
                "C'est un 10, mais il/elle pète au lit et met la couette sur ta tête.",
                "C'est un 10, mais il/elle ne dit jamais \"merci\" au serveur.",
                "C'est un 10, mais il/elle porte toujours un slip kangourou jauni.",
                "C'est un 10, mais il/elle a 30 ans et demande encore de l'argent de poche.",
                "C'est un 10, mais il/elle lèche le couteau avant de le remettre dans le beurre.",
                "C'est un 10, mais il/elle a un fétiche bizarre pour les coudes.",
                "C'est un 10, mais il/elle dort avec un doudou troué qui pue.",
                "C'est un 10, mais il/elle fait pipi sous la douche pendant que tu t'y laves.",
                "C'est un 10, mais il/elle t'appelle \"mamounette\" ou \"papounet\".",
                "C'est un 10, mais il/elle prend 3 heures pour répondre à un message de 2 mots.",
                "C'est un 10, mais il/elle ne met pas de déodorant par \"choix de vie\".",
                "C'est un 10, mais il/elle pleure à chaque fois qu'on tue un insecte.",
                "C'est un 10, mais il/elle se prend en selfie pendant qu'il/elle conduit.",
                "C'est un 10, mais il/elle prononce \"les z'haricots\".",
                "C'est un 10, mais il/elle trouve les blagues de tonton beaufs hilarantes.",
                "C'est un 10, mais il/elle n'a pas de lit, juste un matelas au sol sans drap.",
                "C'est un 10, mais il/elle croit que le clitoris est un type de dinosaure."
            ]
        };

        const gameTitles = {
            tribunal: "Tribunal des Opinions",
            draft: "Draft de l'Absurde",
            prefere: "Tu Préfères... de l'Extrême",
            daube: "Pitch de Daube",
            redflag: "C'est un 10, MAIS..."
        };

        let currentGame = '';
        let availableIndices = {};

        function initIndices() {
            for (let key in phrases) {
                availableIndices[key] = Array.from({length: phrases[key].length}, (_, i) => i);
            }
        }

        function startGame(gameKey) {
            currentGame = gameKey;
            
            const menuView = document.getElementById('menu-view');
            const gameView = document.getElementById('game-view');
            const gameTitle = document.getElementById('game-title');
            
            menuView.style.opacity = '0';
            menuView.style.transform = 'scale(0.9)';
            
            setTimeout(() => {
                menuView.style.display = 'none';
                gameView.style.display = 'flex';
                
                gameTitle.innerText = gameTitles[gameKey];
                gameTitle.className = 'txt-' + gameKey;
                
                setTimeout(() => {
                    gameView.style.opacity = '1';
                    gameView.style.transform = 'translateX(0)';
                    nextPhrase(true);
                }, 50);
            }, 300);
        }

        function nextPhrase(isFirst = false) {
            let list = availableIndices[currentGame];
            
            if (list.length === 0) {
                list = Array.from({length: phrases[currentGame].length}, (_, i) => i);
                availableIndices[currentGame] = list;
            }
            
            const randomIndexList = Math.floor(Math.random() * list.length);
            const phraseIndex = list.splice(randomIndexList, 1)[0];
            
            const textElement = document.getElementById('game-text');
            
            if (isFirst) {
                textElement.innerText = phrases[currentGame][phraseIndex];
                textElement.style.opacity = '1';
                textElement.style.transform = 'scale(1)';
            } else {
                textElement.style.opacity = '0';
                textElement.style.transform = 'scale(0.95)';
                
                setTimeout(() => {
                    textElement.innerText = phrases[currentGame][phraseIndex];
                    textElement.style.opacity = '1';
                    textElement.style.transform = 'scale(1)';
                }, 250);
            }
        }

        function returnMenu() {
            const menuView = document.getElementById('menu-view');
            const gameView = document.getElementById('game-view');
            
            gameView.style.opacity = '0';
            gameView.style.transform = 'translateX(100%)';
            
            setTimeout(() => {
                gameView.style.display = 'none';
                menuView.style.display = 'flex';
                
                setTimeout(() => {
                    menuView.style.opacity = '1';
                    menuView.style.transform = 'scale(1)';
                }, 50);
            }, 300);
        }

        document.addEventListener("DOMContentLoaded", () => {
            initIndices();
        });
    </script>
</body>
</html>
